services:

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: udd-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=udd-cluster
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - udd-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ==================== Kibana ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: udd-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - udd-network

  # ==================== Logstash ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: udd-logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - app-logs:/usr/share/logstash/logs
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "5044:5044"
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - udd-network

  # ==================== MinIO ====================
  minio:
    image: minio/minio:latest
    container_name: udd-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - udd-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Apache Tika ====================
  tika:
    image: apache/tika:2.9.1.0-full
    container_name: udd-tika
    ports:
      - "9998:9998"
    networks:
      - udd-network

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: udd-postgres
    environment:
      - POSTGRES_DB=udd_db
      - POSTGRES_USER=udd_user
      - POSTGRES_PASSWORD=udd_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - udd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U udd_user -d udd_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Spring Boot Backend ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: udd-backend
    ports:
      - "8080:8080"
    volumes:
      - app-logs:/app/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - udd-network
    restart: on-failure

  # ==================== Angular Frontend (nginx) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: udd-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - udd-network
    restart: on-failure

volumes:
  elasticsearch-data:
  minio-data:
  postgres-data:
  app-logs:

networks:
  udd-network:
    driver: bridge
