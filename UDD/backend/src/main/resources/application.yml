server:
  port: 8080

spring:
  application:
    name: udd-forensic

  # ==================== PostgreSQL ====================
  datasource:
    url: jdbc:postgresql://localhost:5433/udd_db
    username: udd_user
    password: udd_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ==================== Elasticsearch ====================
  elasticsearch:
    uris: http://localhost:9200

  # ==================== Servlet (File Upload) ====================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ==================== MinIO Configuration ====================
minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: forensic-reports

# ==================== Apache Tika Configuration ====================
tika:
  url: http://localhost:9998

# ==================== Logging ====================
logging:
  level:
    root: INFO
    com.udd.forensic: DEBUG
    org.springframework.data.elasticsearch: DEBUG
