input {
  file {
    path => "/usr/share/logstash/logs/statistics.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  if "[STATS]" in [message] {
    # Use dissect - simpler and faster than grok for fixed format
    # Format: "2026-02-21 14:43:48.288 [STATS] :: Sombor :: Mihajlo Bogdanovic :: Ransomware"
    dissect {
      mapping => {
        "message" => "%{log_date} %{log_time} [STATS] :: %{grad} :: %{forenzicar} :: %{tip_pretnje}"
      }
    }
    if "_dissectfailure" not in [tags] {
      mutate {
        add_field => { "log_timestamp" => "%{log_date} %{log_time}" }
        remove_field => ["log_date", "log_time", "message", "host", "event", "log"]
        strip => ["grad", "forenzicar", "tip_pretnje"]
      }
      date {
        match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
        target => "@timestamp"
        remove_field => ["log_timestamp"]
      }
    }
  } else {
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "forensic-stats-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
